databases:
  - name: jobboard-db
    plan: free
    databaseName: jobboard
    user: jobboard_user

services:
  - type: web
    name: jobboard-backend
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: ./build.sh
    startCommand: sh -c "python manage.py migrate --no-input && gunicorn config.wsgi:application --bind 0.0.0.0:$PORT"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: jobboard-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: CORS_ALLOW_ALL_ORIGINS
        value: "True"
      - key: PYTHON_VERSION
        value: "3.11.9"
